<script>
var curIdx=0,scale=1,tx=0,ty=0;
var dragging=false,dragX=0,dragY=0;
var autoInterval=null;

var viewer=document.getElementById("viewer");
var img=document.getElementById("img");
var badge=document.getElementById("badge");
var counter=document.getElementById("counter");
var pageInfo=document.getElementById("page-info");
var btnPrev=document.getElementById("btn-prev");
var btnNext=document.getElementById("btn-next");
var thumbsEl=document.getElementById("thumbs");
var btnPlay=document.getElementById("btn-play");
var speedSelect=document.getElementById("speed-select");

function applyTransform(){
  img.style.transform="matrix("+scale+",0,0,"+scale+","+tx+","+ty+")";
  badge.textContent=Math.round(scale*100)+"%";
}
function fitImage(){
  var PAD=24;
  scale=Math.min((viewer.clientWidth-PAD*2)/img.naturalWidth,(viewer.clientHeight-PAD*2)/img.naturalHeight);
  tx=(viewer.clientWidth-img.naturalWidth*scale)/2;
  ty=(viewer.clientHeight-img.naturalHeight*scale)/2;
  applyTransform();
}
function loadImage(idx){
  curIdx=idx;
  img.onload=function(){fitImage();};
  img.src=IMAGES[idx].file;
  counter.textContent=(idx+1)+" / "+IMAGES.length;
  pageInfo.textContent=(idx+1)+" / "+IMAGES.length;
  btnPrev.disabled=idx===0;
  btnNext.disabled=idx===IMAGES.length-1;
  var thumbs=document.querySelectorAll(".thumb");
  for(var i=0;i<thumbs.length;i++) thumbs[i].classList.toggle("active",i===idx);
  var at=thumbsEl.children[idx];
  if(at) at.scrollIntoView({block:"nearest",inline:"nearest"});
}

IMAGES.forEach(function(im,i){
  var t=document.createElement("img");
  t.className="thumb"+(i===0?" active":"");
  t.src=im.file; t.title=im.label;
  t.onclick=(function(idx){return function(){loadImage(idx);};})(i);
  thumbsEl.appendChild(t);
});
loadImage(0);

btnPrev.onclick=function(){if(curIdx>0) loadImage(curIdx-1);};
btnNext.onclick=function(){if(curIdx<IMAGES.length-1) loadImage(curIdx+1);};

document.addEventListener("keydown",function(e){
  if(e.key==="ArrowLeft"){e.preventDefault();if(curIdx>0) loadImage(curIdx-1);}
  else if(e.key==="ArrowRight"){e.preventDefault();if(curIdx<IMAGES.length-1) loadImage(curIdx+1);}
  else if(e.key===" "){e.preventDefault();btnPlay.click();}
});

viewer.addEventListener("wheel",function(e){
  e.preventDefault();
  var f=e.deltaY<0?1.13:1/1.13;
  var ns=Math.min(Math.max(scale*f,0.1),25);
  var vr=viewer.getBoundingClientRect();
  var cx=e.clientX-vr.left,cy=e.clientY-vr.top;
  tx=cx-(cx-tx)*(ns/scale);
  ty=cy-(cy-ty)*(ns/scale);
  scale=ns; applyTransform();
},{passive:false});

viewer.addEventListener("mousedown",function(e){dragging=true;dragX=e.clientX-tx;dragY=e.clientY-ty;viewer.classList.add("dragging");});
document.addEventListener("mousemove",function(e){if(!dragging)return;tx=e.clientX-dragX;ty=e.clientY-dragY;applyTransform();});
document.addEventListener("mouseup",function(){dragging=false;viewer.classList.remove("dragging");});
viewer.addEventListener("dblclick",function(){scale=1;tx=0;ty=0;fitImage();});

function autoNext(){
  if(curIdx<IMAGES.length-1){loadImage(curIdx+1);}
  else{stopAuto();loadImage(0);}
}
function stopAuto(){
  clearInterval(autoInterval);autoInterval=null;
  btnPlay.textContent="▶ 自動播放";btnPlay.classList.remove("playing");
}
btnPlay.onclick=function(){
  if(autoInterval){stopAuto();}
  else{
    autoInterval=setInterval(autoNext,parseInt(speedSelect.value));
    btnPlay.textContent="⏸ 暫停";btnPlay.classList.add("playing");
  }
};
speedSelect.addEventListener("change",function(){
  if(autoInterval){clearInterval(autoInterval);autoInterval=setInterval(autoNext,parseInt(speedSelect.value));}
});
window.addEventListener("resize",function(){fitImage();});
</script>
